spring.application.name=RAG_chatbot
server.port=8080

# Test database configuration using environment variables with defaults
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:chatbot_db}
spring.datasource.username=${POSTGRES_USER:admin}
spring.datasource.password=${POSTGRES_PASSWORD:test1234}

# Postgres DB config
spring.ai.chat.memory.repository.jdbc.initialize-schema=always
spring.jpa.hibernate.ddl-auto=create-drop

# Milvus Vector Database config (with safe defaults for tests)
spring.ai.vectorstore.milvus.client.port=${VECTOR_DATABASE_PORT:19530}
spring.ai.vectorstore.milvus.client.host=${VECTOR_DATABASE_HOST:localhost}
spring.ai.vectorstore.milvus.client.password=${VECTOR_DATABASE_PASSWORD:milvus}
spring.ai.vectorstore.milvus.client.username=${VECTOR_DATABASE_USERNAME:root}

spring.ai.vectorstore.milvus.database-name=${VECTOR_DATABASE_NAME:default}
spring.ai.vectorstore.milvus.collection-name=${VECTOR_DATABASE_COLLECTION_NAME:chatbot_test}
spring.ai.vectorstore.milvus.embedding-dimension=1024
spring.ai.vectorstore.milvus.index-type=IVF_FLAT
spring.ai.vectorstore.milvus.metric-type=COSINE

# Spring AI config
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.model.chat=ollama
spring.ai.ollama.chat.model=llama3.1
