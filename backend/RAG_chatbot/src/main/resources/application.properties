spring.application.name=RAG_chatbot
server.port=8080

spring.config.import=optional:file:../../.env

spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}


# Postgres DB config
spring.ai.chat.memory.repository.jdbc.initialize-schema=always
spring.jpa.hibernate.ddl-auto=create-drop

# Milvus Vector Database config
spring.ai.vectorstore.milvus.client.port=${VECTOR_DATABASE_PORT}
spring.ai.vectorstore.milvus.client.host=${VECTOR_DATABASE_HOST}
spring.ai.vectorstore.milvus.client.password=${VECTOR_DATABASE_PASSWORD}
spring.ai.vectorstore.milvus.client.username=${VECTOR_DATABASE_USERNAME}

spring.ai.vectorstore.milvus.database-name=${VECTOR_DATABASE_NAME}
spring.ai.vectorstore.milvus.collection-name=${VECTOR_DATABASE_COLLECTION_NAME:chatbot}
spring.ai.vectorstore.milvus.index-type=IVF_FLAT
spring.ai.vectorstore.milvus.metric-type=COSINE

# nomic-embed-text dim embedding vectors
spring.ai.vectorstore.milvus.embedding-dimension=768
# Set to 'true' once when changing embedding models to recreate the collection, then set back to 'false'
spring.ai.vectorstore.milvus.initialize-schema=true
# Set to 'true' to drop the collection and re-ingest all documents, then set back to 'false'
milvus.drop-collection-on-startup=true

# Embedding batching config
# nomic-embed-text has 8192 token context - set max-tokens accordingly
spring.ai.embedding.batch.max-tokens=8000
spring.ai.embedding.batch.reserve-percentage=0.1

# Number of documents per vector store insert batch
ingestion.batch-size=1000

# Spring AI config
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.model.chat=ollama
spring.ai.ollama.chat.model=llama3.1

# Ollama embedding model config
spring.ai.ollama.embedding.model=nomic-embed-text

# RAG config
rag.search.default-top-k=15
rag.search.default-similarity-threshold=0.4

logging.level.root=INFO
logging.level.com.rubenzu03.rag_chatbot=INFO
logging.level.com.rubenzu03.rag_chatbot.rag.modules.postretrieve.DocumentPostProcessingModule=DEBUG
